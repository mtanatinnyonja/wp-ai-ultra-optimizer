version: '3.8'

services:
  api:
    build: .
    container_name: wpai-api
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
